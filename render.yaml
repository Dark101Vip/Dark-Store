services:
  - type: web
    name: mahally-eg
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mahally-db
          property: connectionString
    databases:
      - name: mahally-db
        plan: free

{% extends "base.html" %}

{% block title %}تسجيل الدخول - محليّ .EG{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-3xl border border-slate-200 shadow-sm p-8">
    <div class="text-center mb-8">
        <div class="bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-sign-in-alt text-emerald-600 text-2xl"></i>
        </div>
        <h2 class="text-2xl font-black text-slate-800">مرحباً بعودتك 👋</h2>
        <p class="text-sm text-slate-400">سجل دخولك للوصول إلى حسابك</p>
    </div>
    
    <form method="POST" action="{{ url_for('login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="space-y-4">
            <div>
                <label class="text-sm font-bold text-slate-700 block mb-1">رقم الهاتف</label>
                <input type="tel" 
                       name="phone" 
                       required
                       placeholder="مثال: 01012345678"
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-emerald-500 transition-all">
            </div>
            
            <div>
                <label class="text-sm font-bold text-slate-700 block mb-1">كلمة المرور</label>
                <input type="password" 
                       name="password" 
                       required
                       placeholder="••••••••"
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-emerald-500 transition-all">
            </div>
            
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition-all">
                <i class="fas fa-sign-in-alt ml-2"></i> تسجيل الدخول
            </button>
        </div>
    </form>
    
    <div class="text-center mt-6">
        <p class="text-sm text-slate-400">
            ليس لديك حساب؟ <a href="{{ url_for('register') }}" class="text-emerald-600 font-bold hover:underline">سجل الآن</a>
        </p>
    </div>
</div>
{% endblock %}
